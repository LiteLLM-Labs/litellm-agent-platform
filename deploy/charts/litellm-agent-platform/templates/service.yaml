apiVersion: v1
kind: Service
metadata:
  name: {{ include "litellm-agent-platform.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm-agent-platform.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.web.port }}
  selector:
    app: {{ include "litellm-agent-platform.fullname" . }}-web
