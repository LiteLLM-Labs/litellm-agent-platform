apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "litellm-agent-platform.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm-agent-platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 20
  template:
    metadata:
      labels:
        {{- include "litellm-agent-platform.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: {{ .Values.migration.restartPolicy }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - "npx prisma db push --accept-data-loss --skip-generate"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "litellm-agent-platform.secretName" . }}
                  key: DATABASE_URL
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
